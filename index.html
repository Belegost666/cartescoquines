<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  :root {
    --bg: #0d0d0d;
    --card-bg: #1a1a1a;
    --gold: #c5a059;
    --gold-dim: rgba(197,160,89,0.3);
    --red: #e60000;
    --pink: #ffb3b3;
    --text: #f0ece4;
    --muted: #666;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Georgia', 'Times New Roman', serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 24px 16px 32px;
  }

  h1 {
    font-family: 'Segoe UI', Helvetica, Arial, sans-serif;
    font-size: 0.75rem;
    font-weight: 400;
    text-transform: uppercase;
    letter-spacing: 5px;
    color: var(--gold);
    margin-bottom: 28px;
    opacity: 0.85;
  }

  #app {
    width: 100%;
    max-width: 320px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 18px;
  }

  .flip-wrap {
    width: 100%;
    aspect-ratio: 2 / 3.2;
    perspective: 900px;
    cursor: pointer;
  }

  .flip-inner {
    width: 100%;
    height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.55s cubic-bezier(0.45, 0.05, 0.55, 0.95);
  }

  .flip-inner.flipped {
    transform: rotateY(180deg);
  }

  .card-face {
    position: absolute;
    inset: 0;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    border-radius: 14px;
    border: 1.5px solid var(--gold);
    background: var(--card-bg);
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 28px 22px;
  }

  .card-face::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(197,160,89,0.04) 39px, rgba(197,160,89,0.04) 40px),
      repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(197,160,89,0.04) 39px, rgba(197,160,89,0.04) 40px);
    pointer-events: none;
  }

  /* DOS */
  .card-back { justify-content: center; }

  .back-border {
    position: absolute;
    inset: 12px;
    border: 1px solid var(--gold-dim);
    border-radius: 8px;
    pointer-events: none;
  }

  .back-symbol {
    font-size: 3rem;
    color: var(--gold);
    opacity: 0.18;
    user-select: none;
    line-height: 1;
  }

  .back-label {
    font-size: 0.6rem;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--gold);
    opacity: 0.3;
    font-family: 'Segoe UI', sans-serif;
    margin-top: 10px;
  }

  /* FACE */
  .card-front {
    transform: rotateY(180deg);
    padding: 22px 20px;
  }

  .corner {
    position: absolute;
    color: var(--gold);
    font-size: 0.7rem;
    opacity: 0.7;
    line-height: 1;
    user-select: none;
  }
  .corner.tl { top: 10px; left: 12px; }
  .corner.tr { top: 10px; right: 12px; }
  .corner.bl { bottom: 10px; left: 12px; }
  .corner.br { bottom: 10px; right: 12px; }

  .card-content {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    width: 100%;
    z-index: 1;
  }

  .task-text {
    font-size: 1.1rem;
    line-height: 1.65;
    text-align: center;
    color: var(--text);
  }

  .number-highlight {
    color: var(--red);
    font-weight: bold;
    font-size: 1.25em;
  }

  .variant-sep {
    width: 40px;
    height: 1px;
    background: var(--gold-dim);
    margin: 18px auto;
    display: none;
  }

  .variant-text {
    font-size: 0.82rem;
    line-height: 1.55;
    text-align: center;
    color: var(--pink);
    font-style: italic;
    display: none;
    opacity: 0.85;
  }

  .instruction {
    font-family: 'Segoe UI', Helvetica, Arial, sans-serif;
    font-size: 0.72rem;
    color: var(--muted);
    font-style: italic;
    text-align: center;
    line-height: 1.5;
  }
</style>
</head>
<body>

    { t: "Lance un minuteur qu'il ne voit pas. Demande-lui de te faire jouir avant la fin du chrono. S'il réussit, il aura aussi le droit de jouir. S'il échoue, il devra te faire jouir quand même (faut pas déconner…) mais il ne pourra pas jouir ensuite.", v: "Idée coquine : si tu ne veux pas le laisser jouir, choisis une durée très courte. Au contraire, si tu veux le laisser jouir choisis une durée très longue." }

  let isFlipped = false;
  let isAnimating = false;
  let lastIndex = -1;
  let pendingTask = null;

  function parseRandom(text) {
    return text.replace(/\[(\d+)[−\-](\d+)\]/g, (_, min, max) => {
      const n = Math.floor(Math.random() * (parseInt(max) - parseInt(min) + 1)) + parseInt(min);
      return '<span class="number-highlight">' + n + '</span>';
    });
  }

  function pickTask() {
    let idx;
    do { idx = Math.floor(Math.random() * tasks.length); } while (idx === lastIndex && tasks.length > 1);
    lastIndex = idx;
    return tasks[idx];
  }

  function applyTask(task) {
    document.getElementById('task-display').innerHTML = parseRandom(task.t);
    const vsep = document.getElementById('vsep');
    const vd = document.getElementById('variant-display');
    if (task.v) {
      vd.innerHTML = parseRandom(task.v);
      vd.style.display = 'block';
      vsep.style.display = 'block';
    } else {
      vd.style.display = 'none';
      vsep.style.display = 'none';
    }
  }

  function drawCard() {
    if (isAnimating) return;
    const flipper = document.getElementById('flipper');
    isAnimating = true;

    if (!isFlipped) {
      // Premier tirage : on prépare le contenu puis on flip vers la face
      applyTask(pickTask());
      flipper.classList.add('flipped');
      isFlipped = true;
      setTimeout(() => { isAnimating = false; }, 580);
    } else {
      // Nouvelle carte : on prépare le prochain contenu à mi-chemin
      pendingTask = pickTask();
      // On retire flipped pour revenir au dos (flip retour dans le même sens)
      flipper.style.transition = 'none';
      flipper.style.transform = 'rotateY(180deg)';
      // On force un reflow puis on re-flip directement vers 360deg (= face, côté inverse)
      void flipper.offsetWidth;
      flipper.style.transition = 'transform 0.55s cubic-bezier(0.45, 0.05, 0.55, 0.95)';
      flipper.style.transform = 'rotateY(360deg)';

      // À mi-animation, on met à jour le contenu (carte cachée côté dos)
      setTimeout(() => {
        applyTask(pendingTask);
      }, 270);

      // Fin de l'animation : on remet les classes proprement
      setTimeout(() => {
        flipper.style.transition = 'none';
        flipper.style.transform = '';
        flipper.classList.add('flipped');
        void flipper.offsetWidth;
        flipper.style.transition = 'transform 0.55s cubic-bezier(0.45, 0.05, 0.55, 0.95)';
        isAnimating = false;
      }, 580);
    }
  }
</script>
