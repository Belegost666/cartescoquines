    <style>
        :root {
            --bg-color: #0d0d0d;
            --card-bg: #1a1a1a;
            --accent-color: #e60000;
            --text-color: #f2f2f2;
            --variant-color: #ffb3b3;
            --gold: #c5a059;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            margin: 0;
            padding: 15px;
            text-align: center;
        }

        h1 {
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-top: 5px;
            margin-bottom: 15px;
            color: var(--gold);
            opacity: 0.9;
        }

        #app-container {
            width: 100%;
            max-width: 340px; /* Largeur typique smartphone */
        }

        .card {
            background-color: var(--card-bg);
            border: 2px solid var(--gold); /* Bordure style Tarot */
            border-radius: 15px;
            padding: 25px;
            aspect-ratio: 2 / 3.2; /* Ratio vertical Tarot */
            display: flex;
            flex-direction: column;
            justify-content: center; /* Centre le texte verticalement */
            align-items: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.8);
            margin-bottom: 20px;
            position: relative;
            overflow: hidden;
            background-image: linear-gradient(45deg, #1a1a1a 25%, #222 25%, #222 50%, #1a1a1a 50%, #1a1a1a 75%, #222 75%, #222 100%);
            background-size: 40px 40px; /* Léger motif de fond */
        }

        /* Coins décoratifs */
        .card::before {
            content: '✦';
            position: absolute;
            top: 10px;
            left: 10px;
            color: var(--gold);
            font-size: 0.8rem;
        }

        .card::after {
            content: '✦';
            position: absolute;
            bottom: 10px;
            right: 10px;
            color: var(--gold);
            font-size: 0.8rem;
        }

        .task-text {
            font-size: 1.2rem;
            line-height: 1.5;
            margin-bottom: 0;
            z-index: 1;
        }

        .variant-container {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid var(--gold);
            color: var(--variant-color);
            font-style: italic;
            font-size: 0.95rem;
            display: none; /* Apparaît au tirage */
            z-index: 1;
        }

        .number-highlight {
            color: var(--accent-color);
            font-weight: bold;
            font-size: 1.4rem;
            text-shadow: 0 0 10px rgba(230, 0, 0, 0.3);
        }

        button {
            background-color: var(--accent-color);
            color: white;
            border: 1px solid var(--gold);
            border-radius: 8px;
            padding: 16px 20px;
            font-size: 1rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            width: 100%;
            box-shadow: 0 4px 15px rgba(230, 0, 0, 0.4);
            transition: all 0.2s;
        }

        button:active {
            transform: scale(0.98);
            background-color: #b30000;
        }

        .instruction {
            font-size: 0.8rem;
            color: #777;
            margin-top: 15px;
            font-style: italic;
        }
    </style>
</head>

        function getRandomTask() {
